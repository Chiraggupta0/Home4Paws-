services:

  backend:
    image: home4paws-backend
    container_name: home4paws-backend
    restart: unless-stopped
    depends_on:
        - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require
      SPRING_DATASOURCE_USERNAME: postgres.fdnngmfcveylwgkwjrov
      SPRING_DATASOURCE_PASSWORD: Chir@989707
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      LOG_DIR: /app/logs
    ports:
      - "8080:8080"
    volumes:
      # Persist rolling log files on the host so they survive container rebuilds
      - ./logs:/app/logs

  frontend:
    image: home4paws-frontend
    container_name: home4paws-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"

  redis:
    image: redis:7-alpine
    container_name: home4paws-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:alpine
    container_name: home4paws-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Reload every 6h so renewed certs are picked up
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: home4paws-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Attempt renewal every 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  redis-data: