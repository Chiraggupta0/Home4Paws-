name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1) Always runs (push + PR): proves the code compiles before it can deploy
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: home4paws-frontend/package-lock.json

      - name: Build frontend
        working-directory: home4paws-frontend
        run: |
          npm install
          npm run build

  # 2) Runs ONLY on push to main, and ONLY if "build" succeeded
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Home4Paws-
            git pull
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
            docker build -t home4paws-backend .
            docker build -t home4paws-frontend ./home4paws-frontend
            docker compose up -d --remove-orphans
