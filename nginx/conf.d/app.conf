# ── HTTP: serve the ACME challenge, redirect everything else to HTTPS ──
server {
    listen 80;
    server_name home4paws.in www.home4paws.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: reverse proxy to the app ──
server {
    listen 443 ssl;
    server_name home4paws.in www.home4paws.in;

    ssl_certificate     /etc/letsencrypt/live/home4paws.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/home4paws.in/privkey.pem;

    # API → Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (chat) — no buffering, keep the stream open
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
    }

    # Everything else → React frontend (Vite preview)
    location / {
        proxy_pass http://frontend:4173;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
